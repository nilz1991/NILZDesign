  <title>Contact — NILZ Architecture & Interior Design Group</title>
  <link rel="icon" type="image/png" href="assets/images/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500;1,600&family=DM+Sans:wght@300;400;500&family=Tajawal:wght@300;400;500;700&family=El+Messiri:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=17">
  <script src="js/analytics.js" defer></script>
</head>
<body>

  <section class="page-hero">
    <img src="assets/images/project-3.jpg" alt="" class="page-hero__bg">
    <div class="page-hero__content">
      <span class="section-tag page-hero__tag" data-i18n="tag.contact">Contact</span>
      <h1 class="page-hero__title display" data-cms="hero_title">Let's talk today.</h1>
      <p style="color:rgba(255,255,255,0.65);font-size:1.1rem;margin-top:16px;max-width:500px" data-cms="hero_sub">Whether you're starting a project or just exploring ideas, we'd love to hear from you.</p>
    </div>
  </section>

  <section class="section section--white contact-section">
    <div class="container contact-inner">
      <!-- Form -->
      <div class="contact-form-wrap fade-up">
        <h2 class="contact-form__title" data-i18n="contact.form_title">Apply for a collaboration</h2>
        <form class="contact-form" name="contact" method="POST" action="https://formsubmit.co/niloofar.zanjani22@gmail.com">
          <input type="hidden" name="_next" value="https://nilzdesign.com/thank-you">
          <input type="hidden" name="_captcha" value="false">
          <div class="form-row">
            <div class="form-group">
              <label for="name" data-i18n="form.name">Your name</label>
              <input type="text" id="name" name="name" required placeholder="Niloufar Zanjani" data-i18n-ph="form.ph_name">
            </div>
            <div class="form-group">
              <label for="email" data-i18n="form.email">Your email</label>
              <input type="email" id="email" name="email" required placeholder="hello@nilz.com" data-i18n-ph="form.ph_email">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="phone" data-i18n="form.phone">Your phone</label>
              <input type="tel" id="phone" name="phone" placeholder="+968 9xxx xxxx" data-i18n-ph="form.ph_phone">
            </div>
            <div class="form-group">
              <label for="company" data-i18n="form.company">Your company</label>
              <input type="text" id="company" name="company" placeholder="Optional" data-i18n-ph="form.ph_company">
            </div>
          </div>
          <div class="form-group">
            <label for="message" data-i18n="form.message">Your message</label>
            <textarea id="message" name="message" rows="5" required placeholder="Tell us about your project..." data-i18n-ph="form.ph_message"></textarea>
          </div>
          <div class="form-group">
            <label data-i18n="form.solution_label">What solution do you need?</label>

            <span class="form-subhead" data-i18n="form.grp_interior">Interior Design</span>
            <div class="form-checks">
              <label class="check-label"><input type="checkbox" name="Interior Design" value="House"> <span data-i18n="form.opt_house">House</span></label>
              <label class="check-label"><input type="checkbox" name="Interior Design" value="Office"> <span data-i18n="form.opt_office">Office</span></label>
              <label class="check-label"><input type="checkbox" name="Interior Design" value="Shop"> <span data-i18n="form.opt_shop">Shop</span></label>
              <label class="check-label"><input type="checkbox" name="Interior Design" value="Beauty Salon"> <span data-i18n="form.opt_salon">Beauty Salon</span></label>
              <label class="check-label"><input type="checkbox" name="Interior Design" value="Partial Design"> <span data-i18n="form.opt_partial">Partial Design</span></label>
            </div>

            <span class="form-subhead" data-i18n="form.grp_exterior">Exterior Design</span>
            <div class="form-checks">
              <label class="check-label"><input type="checkbox" name="Exterior Design" value="Facade Design"> <span data-i18n="form.opt_facade">Facade Design</span></label>
              <label class="check-label"><input type="checkbox" name="Exterior Design" value="Landscape Design"> <span data-i18n="form.opt_landscape">Landscape Design</span></label>
            </div>

            <span class="form-subhead" data-i18n="form.grp_area">Area</span>
            <div class="form-checks">
              <label class="check-label"><input type="radio" name="Area" value="Under 100 m2"> <span data-i18n="form.area_u100">Under 100 m²</span></label>
              <label class="check-label"><input type="radio" name="Area" value="100-500 m2"> <span data-i18n="form.area_100_500">100–500 m²</span></label>
              <label class="check-label"><input type="radio" name="Area" value="500-1000 m2"> <span data-i18n="form.area_500_1000">500–1,000 m²</span></label>
              <label class="check-label"><input type="radio" name="Area" value="1000-2000 m2"> <span data-i18n="form.area_1000_2000">1,000–2,000 m²</span></label>
              <label class="check-label"><input type="radio" name="Area" value="Over 2000 m2"> <span data-i18n="form.area_o2000">Over 2,000 m²</span></label>
            </div>
          </div>
          <button type="submit" class="btn btn--solid" style="width:100%;justify-content:center;padding:18px" data-i18n="btn.submit">Submit</button>
        </form>
      </div>
      <!-- Info -->
      <div class="contact-info fade-up delay-1">
        <div class="contact-info__item">
          <span class="contact-info__label" data-i18n="info.phone">Phone</span>
          <a href="tel:+96899009464" class="contact-info__value contact-num" data-cms="phone">+968 99009464</a>
        </div>
        <div class="contact-info__item">
          <span class="contact-info__label" data-i18n="info.whatsapp">WhatsApp</span>
          <a href="https://api.whatsapp.com/send?phone=96892315257" data-cms-href="whatsapp" data-cms="whatsapp_number" target="_blank" rel="noopener" class="contact-info__value contact-num">+968 92315257</a>
        </div>
        <div class="contact-info__item">
          <span class="contact-info__label" data-i18n="info.location">Location</span>
          <span class="contact-info__value" data-i18n="info.location_value">Al Mouj Street, Muscat<br>Oman</span>
        </div>
        <div class="contact-info__item">
          <span class="contact-info__label" data-i18n="info.follow">Follow Us</span>
          <div class="contact-socials">

            <a href="https://www.instagram.com/nilz.design" data-cms-href="instagram" target="_blank" rel="noopener" class="contact-social-link" aria-label="Instagram">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
            </a>
            <a href="https://www.linkedin.com/in/niloufar-zanjani-2888a4271" data-cms-href="linkedin" target="_blank" rel="noopener" class="contact-social-link" aria-label="LinkedIn">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
            </a>
            <a href="https://www.facebook.com/share/1Hh7Pq64TZ/?mibextid=wwXIfr" data-cms-href="facebook" target="_blank" rel="noopener" class="contact-social-link" aria-label="Facebook">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>

          </div>
        </div>
      </div>
    </div>
  </section>

  <script type="module">
    import { initHeader } from './js/components/header.js';
    import { initFooter } from './js/components/footer.js';
    import { renderSiteContent } from './js/content.js';
    import { init as initMain } from './js/main.js';
    import { initI18n, applyStatic, onLangChange } from './js/i18n.js';

    await initI18n();
    initHeader();
    initFooter();

    onLangChange(() => renderSiteContent('contact'));
    applyStatic();
    initMain();
