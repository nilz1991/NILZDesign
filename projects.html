<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>try{var l=new URLSearchParams(location.search).get('lang')||localStorage.getItem('nilz_lang');if(l==='ar'){document.documentElement.lang='ar';document.documentElement.dir='rtl';document.documentElement.classList.add('lang-ar');}}catch(e){}</script>
  <title>Projects — NILZ Architecture & Interior Design Group</title>
  <link rel="icon" type="image/png" href="assets/images/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500;1,600&family=DM+Sans:wght@300;400;500&family=Tajawal:wght@300;400;500;700&family=El+Messiri:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=23">
  <script src="js/analytics.js" defer></script>
</head>
<body>

  <section class="page-hero">
    <img src="assets/images/project-4.jpg" alt="" class="page-hero__bg">
    <div class="page-hero__content">
      <span class="section-tag page-hero__tag" data-i18n="tag.projects">Projects</span>
      <h1 class="page-hero__title display" data-i18n="projects.title">Selected <em>Work</em></h1>
    </div>
  </section>

  <section class="section section--cream">
    <div class="container">
      <!-- Hint: cards are clickable and open into more work -->
      <div class="projects-hint fade-up">
        <span class="projects-hint__cursor" aria-hidden="true">
          <span class="projects-hint__ripple"></span>
          <svg class="projects-hint__icon" viewBox="0 0 24 24" width="17" height="17" fill="currentColor">
            <path d="M5 3l14 7-6 1.6L9.5 18 5 3z"></path>
          </svg>
        </span>
        <span data-i18n="projects.hint">Tap the cards to open the full projects.</span>
      </div>
      <!-- Project grid (grouped by category) -->
      <div id="projects-grid"></div>
      <!-- Instagram CTA -->
      <div class="projects-instagram fade-up">
        <p data-i18n="projects.instagram_text">See more work on Instagram</p>
        <a href="https://www.instagram.com/nilz.design" target="_blank" rel="noopener" class="btn btn--outline">
          @nilz.design →
        </a>
      </div>
    </div>
  </section>

  <div id="rotating-text-placeholder"></div>

  <script type="module">
    import { initHeader } from './js/components/header.js';
    import { initFooter } from './js/components/footer.js';
    import { initRotatingText } from './js/components/rotating-text.js';
    import { renderProjectsGrid } from './js/content.js';
    import { init as initMain } from './js/main.js';
    import { initI18n, applyStatic, t, onLangChange } from './js/i18n.js';

    await initI18n();
    initHeader();
    initFooter();

    async function renderProjectsPage() {
      initRotatingText('#rotating-text-placeholder', {
        tag:            t('statement.tag'),
        headline:       t('statement.headline'),
        headlineEm:     t('statement.headline_em'),
        sub:            t('statement.sub.projects'),
        ctaLabel:       t('statement.cta'),
        ctaHref:        'contact.html',
        decorativeImage:'assets/images/line-art-hero.png',
      });
      await renderProjectsGrid('#projects-grid');
      buildJumpToc();
    }

    // Floating quick-jump button + glassy menu (mirrors the project-page TOC),
    // so categories are reachable from anywhere on the page.
    function buildJumpToc() {
      document.querySelectorAll('.pd-toc').forEach(el => el.remove());
      const groups = [...document.querySelectorAll('.projects-group')];
      if (groups.length < 2) return;
      const toc = document.createElement('div');
      toc.className = 'pd-toc';
      toc.innerHTML = `
        <nav class="pd-toc-menu">
          ${groups.map((g, idx) =>
            `<a class="pd-toc-menu__item" href="#${g.id}" style="--i:${groups.length - idx}"><span class="pd-toc-menu__title">${g.querySelector('.projects-cat-title')?.textContent || ''}</span></a>`
          ).join('')}
        </nav>
        <button class="pd-toc-fab" type="button" aria-label="Jump to a section">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="6"></line><polyline points="5 13 12 6 19 13"></polyline>
          </svg>
        </button>`;
      document.body.appendChild(toc);
      const tocFab = toc.querySelector('.pd-toc-fab');
      const tocMenu = toc.querySelector('.pd-toc-menu');
      const isTouch = () => window.matchMedia('(hover: none)').matches;
      const openMenu  = () => { clearTimeout(toc._t); toc.classList.add('pd-toc--open'); };
      const closeMenu = () => { clearTimeout(toc._t); toc.classList.remove('pd-toc--open'); };
      const scheduleClose = () => { clearTimeout(toc._t); toc._t = setTimeout(closeMenu, 160); };
      [tocFab, tocMenu].forEach(el => {
        el.addEventListener('mouseenter', () => { if (!isTouch()) openMenu(); });
        el.addEventListener('mouseleave', () => { if (!isTouch()) scheduleClose(); });
      });
      tocFab.addEventListener('click', (e) => {
        if (isTouch()) { e.stopPropagation(); toc.classList.toggle('pd-toc--open'); }
        else { window.scrollTo({ top: 0, behavior: 'smooth' }); }
      });
      tocMenu.querySelectorAll('.pd-toc-menu__item').forEach(a => a.addEventListener('click', closeMenu));
      toc.classList.add('pd-toc--show');   // always visible, including at the Interior section
    }

    document.addEventListener('click', (e) => {
      const toc = document.querySelector('.pd-toc');
      if (toc && !toc.contains(e.target)) toc.classList.remove('pd-toc--open');
    });

    await renderProjectsPage();
    onLangChange(renderProjectsPage);
    applyStatic();
    initMain();
  </script>
</body>
</html>
