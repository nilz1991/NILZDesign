<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects — NILZ Architecture & Interior Design Group</title>
  <link rel="icon" type="image/png" href="assets/images/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=4">
  <script src="js/analytics.js" defer></script>
</head>
<body>

  <section class="page-hero">
    <img src="assets/images/project-4.jpg" alt="" class="page-hero__bg">
    <div class="page-hero__content">
      <span class="section-tag page-hero__tag">Projects</span>
      <h1 class="page-hero__title display">Selected <em>Work</em></h1>
    </div>
  </section>

  <section class="section section--cream">
    <div class="container">
      <!-- Filter bar -->
      <div class="filter-bar fade-up">
        <button class="filter-btn active" data-filter="All">All</button>
        <button class="filter-btn" data-filter="Interior Design">Interior Design</button>
        <button class="filter-btn" data-filter="Architecture">Architecture</button>
        <button class="filter-btn" data-filter="Engineering & Technical Drawings">Technical Drawings</button>
        <button class="filter-btn" data-filter="Visualization">Visualization</button>
      </div>
      <!-- Project grid -->
      <div id="projects-grid" class="projects-grid"></div>
      <!-- Instagram CTA -->
      <div class="projects-instagram fade-up">
        <p>See more work on Instagram</p>
        <a href="https://www.instagram.com/nilz.design" target="_blank" rel="noopener" class="btn btn--outline">
          @nilz.design →
        </a>
      </div>
    </div>
  </section>

  <div id="rotating-text-placeholder"></div>

  <script type="module">
    import { initHeader } from './js/components/header.js';
    import { initFooter } from './js/components/footer.js';
    import { initRotatingText } from './js/components/rotating-text.js';
    import { renderProjectsGrid } from './js/content.js';
    import { init as initMain } from './js/main.js';

    initHeader();
    initFooter();
    initRotatingText('#rotating-text-placeholder', {
      tag:            "Let's Build Your Dream",
      headline:       'Elevate Your',
      headlineEm:     'Project.',
      sub:            'Ready to start something extraordinary? Let\'s shape your vision into a space that lasts.',
      ctaLabel:       'Contact Us Today',
      ctaHref:        'contact.html',
      decorativeImage:'assets/images/line-art-hero.png',
    });
    await renderProjectsGrid('#projects-grid', '.filter-btn');
    initMain();
  </script>
</body>
</html>
