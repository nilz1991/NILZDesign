<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>try{var l=new URLSearchParams(location.search).get('lang')||localStorage.getItem('nilz_lang');if(l==='ar'){document.documentElement.lang='ar';document.documentElement.dir='rtl';document.documentElement.classList.add('lang-ar');}}catch(e){}</script>
  <title>Projects — NILZ Architecture & Interior Design Group</title>
  <link rel="icon" type="image/png" href="assets/images/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500;1,600&family=DM+Sans:wght@300;400;500&family=Tajawal:wght@300;400;500;700&family=El+Messiri:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=13">
  <script src="js/analytics.js" defer></script>
</head>
<body>

  <section class="page-hero">
    <img src="assets/images/project-4.jpg" alt="" class="page-hero__bg">
    <div class="page-hero__content">
      <span class="section-tag page-hero__tag" data-i18n="tag.projects">Projects</span>
      <h1 class="page-hero__title display" data-i18n="projects.title">Selected <em>Work</em></h1>
    </div>
  </section>

  <section class="section section--cream">
    <div class="container">
      <!-- Filter bar -->
      <div class="filter-bar fade-up">
        <button class="filter-btn active" data-filter="All" data-i18n="filter.all">All</button>
        <button class="filter-btn" data-filter="Interior Design" data-i18n="filter.interior">Interior Design</button>
        <button class="filter-btn" data-filter="Architecture" data-i18n="filter.architecture">Architecture</button>
        <button class="filter-btn" data-filter="Engineering & Technical Drawings" data-i18n="filter.technical">Technical Drawings</button>
        <button class="filter-btn" data-filter="Visualization" data-i18n="filter.visualization">Visualization</button>
      </div>
      <!-- Project grid -->
      <div id="projects-grid" class="projects-grid"></div>
      <!-- Instagram CTA -->
      <div class="projects-instagram fade-up">
        <p data-i18n="projects.instagram_text">See more work on Instagram</p>
        <a href="https://www.instagram.com/nilz.design" target="_blank" rel="noopener" class="btn btn--outline">
          @nilz.design →
        </a>
      </div>
    </div>
  </section>

  <div id="rotating-text-placeholder"></div>

  <script type="module">
    import { initHeader } from './js/components/header.js';
    import { initFooter } from './js/components/footer.js';
    import { initRotatingText } from './js/components/rotating-text.js';
    import { renderProjectsGrid } from './js/content.js';
    import { init as initMain } from './js/main.js';
    import { initI18n, applyStatic, t, onLangChange } from './js/i18n.js';

    await initI18n();
    initHeader();
    initFooter();

    async function renderProjectsPage() {
      initRotatingText('#rotating-text-placeholder', {
        tag:            t('statement.tag'),
        headline:       t('statement.headline'),
        headlineEm:     t('statement.headline_em'),
        sub:            t('statement.sub.projects'),
        ctaLabel:       t('statement.cta'),
        ctaHref:        'contact.html',
        decorativeImage:'assets/images/line-art-hero.png',
      });
      await renderProjectsGrid('#projects-grid', '.filter-btn');
    }

    await renderProjectsPage();
    onLangChange(renderProjectsPage);
    applyStatic();
    initMain();
  </script>
</body>
</html>
