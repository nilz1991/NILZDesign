backend:
  name: git-gateway
  branch: main

media_folder: "assets/images"
public_folder: "assets/images"

collections:
  - name: "projects"
    label: "Projects"
    folder: "_data/projects"
    create: true
    slug: "{{slug}}"
    format: "json"
    extension: "json"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "select",
          options: ["Interior Design", "Architecture", "Landscape & Exterior", "Visualization"] }
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Featured on Home", name: "featured", widget: "boolean", default: false }
      - { label: "Sort Order", name: "order", widget: "number", default: 99 }

  - name: "pages"
    label: "Page Content"
    files:
      - label: "Home Page"
        name: "home"
        file: "_data/site.json"
        fields:
          - label: "Home"
            name: "home"
            widget: "object"
            fields:
              - { label: "Hero Headline", name: "hero_headline", widget: "string" }
              - { label: "Hero Subtitle", name: "hero_sub", widget: "string" }
              - { label: "About Quote", name: "about_quote", widget: "text" }
              - { label: "About Body", name: "about_body", widget: "text" }
