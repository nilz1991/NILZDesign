<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collection — NILZ</title>
  <link rel="icon" type="image/png" href="assets/images/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/analytics.js" defer></script>
</head>
<body>

  <section class="page-hero">
    <img src="assets/images/services-hero.jpg" alt="" class="page-hero__bg" id="col-hero-bg">
    <div class="page-hero__content">
      <a href="projects.html" class="page-hero__back">&#8592; All Projects</a>
      <span class="section-tag page-hero__tag" id="col-cat"></span>
      <h1 class="page-hero__title display" id="col-title">Collection</h1>
    </div>
  </section>

  <section class="section section--cream">
    <div class="container">
      <p class="services-intro fade-up" id="col-desc" style="max-width:760px;margin:0 auto 56px"></p>
      <div id="collection-grid" class="projects-grid"></div>
    </div>
  </section>

  <div id="rotating-text-placeholder"></div>

  <script type="module">
    import { initHeader } from './js/components/header.js';
    import { initFooter } from './js/components/footer.js';
    import { initRotatingText } from './js/components/rotating-text.js';
    import { renderCollection } from './js/content.js';
    import { init as initMain } from './js/main.js';

    initHeader();
    initFooter();

    const id = new URLSearchParams(location.search).get('id');
    if (!id) location.href = 'projects.html';

    const col = await renderCollection(id, '#collection-grid');
    if (!col) {
      location.href = 'projects.html';
    } else {
      document.title = `${col.title} — NILZ`;
      if (col.image) document.getElementById('col-hero-bg').src = col.image;
      document.getElementById('col-cat').textContent = col.category || '';
      document.getElementById('col-title').textContent = col.title;
      document.getElementById('col-desc').textContent = col.description || '';
    }

    initRotatingText('#rotating-text-placeholder', {
      tag:            "Let's Build Your Dream",
      headline:       'Elevate Your',
      headlineEm:     'Project.',
      sub:            'Architecture, interiors, landscape, and visualization — all under one roof, one vision, one team.',
      ctaLabel:       'Contact Us Today',
      ctaHref:        'contact.html',
      decorativeImage:'assets/images/line-art-hero.png',
    });
    initMain();
  </script>
</body>
</html>
