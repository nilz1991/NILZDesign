<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>try{var l=new URLSearchParams(location.search).get('lang')||localStorage.getItem('nilz_lang');if(l==='ar'){document.documentElement.lang='ar';document.documentElement.dir='rtl';document.documentElement.classList.add('lang-ar');}}catch(e){}</script>
  <title>Collection — NILZ</title>
  <meta name="description" content="Explore a collection of work by NILZ Architecture & Interior Design Group — Muscat, Oman.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://nilzdesign.com/collection.html">
  <meta name="theme-color" content="#1b2b4b">
  <link rel="icon" type="image/png" href="assets/images/logo.png">
  <link rel="apple-touch-icon" href="assets/images/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="NILZ">
  <meta property="og:title" content="Collection — NILZ">
  <meta property="og:description" content="Explore a collection of work by NILZ Architecture & Interior Design Group — Muscat, Oman.">
  <meta property="og:url" content="https://nilzdesign.com/collection.html">
  <meta property="og:image" content="https://nilzdesign.com/assets/images/og-image.jpg">
  <meta property="og:locale" content="en_US">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Collection — NILZ">
  <meta name="twitter:description" content="Explore a collection of work by NILZ Architecture & Interior Design Group — Muscat, Oman.">
  <meta name="twitter:image" content="https://nilzdesign.com/assets/images/og-image.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500;1,600&family=DM+Sans:wght@300;400;500&family=Tajawal:wght@300;400;500;700&family=El+Messiri:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=27">
  <script src="js/analytics.js" defer></script>
</head>
<body>

  <section class="page-hero">
    <img src="assets/images/services-hero.jpg" alt="" class="page-hero__bg" id="col-hero-bg">
    <div class="page-hero__content">
      <a href="projects.html" class="page-hero__back" data-i18n="back.all_projects">&#8592; All Projects</a>
      <span class="section-tag page-hero__tag" id="col-cat"></span>
      <h1 class="page-hero__title display" id="col-title">Collection</h1>
    </div>
  </section>

  <section class="section section--cream">
    <div class="container">
      <p class="services-intro fade-up" id="col-desc" style="max-width:760px;margin:0 auto 56px"></p>
      <div id="collection-grid" class="projects-grid"></div>
    </div>
  </section>

  <div id="rotating-text-placeholder"></div>

  <script type="module">
    import { initHeader } from './js/components/header.js';
    import { initFooter } from './js/components/footer.js';
    import { initRotatingText } from './js/components/rotating-text.js';
    import { renderCollection } from './js/content.js';
    import { init as initMain } from './js/main.js';
    import { initI18n, applyStatic, t, tf, onLangChange } from './js/i18n.js';

    await initI18n();
    initHeader();
    initFooter();

    const id = new URLSearchParams(location.search).get('id');
    if (!id) location.href = 'projects.html';

    const absUrl = (p) => p ? (p.startsWith('http') ? p : 'https://nilzdesign.com/' + p.replace(/^\//, '')) : null;
    function updateSeo({ title, desc, url, image }) {
      const set = (sel, attr, val) => { const el = document.querySelector(sel); if (el && val) el.setAttribute(attr, val); };
      if (title) document.title = title;
      set('meta[name="description"]', 'content', desc);
      set('link[rel="canonical"]', 'href', url);
      set('meta[property="og:title"]', 'content', title);
      set('meta[property="og:description"]', 'content', desc);
      set('meta[property="og:url"]', 'content', url);
      set('meta[property="og:image"]', 'content', image);
      set('meta[name="twitter:title"]', 'content', title);
      set('meta[name="twitter:description"]', 'content', desc);
      set('meta[name="twitter:image"]', 'content', image);
    }

    async function renderCollectionPage() {
      const col = await renderCollection(id, '#collection-grid');
      if (!col) { location.href = 'projects.html'; return; }
      document.title = `${tf(col, 'title')} — NILZ`;
      const heroSrc = col.hero || col.image;
      if (heroSrc) document.getElementById('col-hero-bg').src = heroSrc;
      document.getElementById('col-cat').textContent = tf(col, 'category') || '';
      document.getElementById('col-title').textContent = tf(col, 'title');
      document.getElementById('col-desc').textContent = tf(col, 'description') || '';
      updateSeo({
        title: `${tf(col, 'title')} — NILZ`,
        desc: tf(col, 'description') || 'A collection of work by NILZ Architecture & Interior Design Group — Muscat, Oman.',
        url: `https://nilzdesign.com/collection.html?id=${id}`,
        image: absUrl(heroSrc),
      });
      initRotatingText('#rotating-text-placeholder', {
        tag:            t('statement.tag'),
        headline:       t('statement.headline'),
        headlineEm:     t('statement.headline_em'),
        sub:            t('statement.sub.home'),
        ctaLabel:       t('statement.cta'),
        ctaHref:        'contact.html',
        decorativeImage:'assets/images/line-art-hero.png',
      });
    }

    await renderCollectionPage();
    onLangChange(renderCollectionPage);
    applyStatic();
    initMain();
  </script>
</body>
</html>
