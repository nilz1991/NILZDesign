<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project — NILZ</title>
  <link rel="icon" type="image/png" href="assets/images/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Hero -->
  <section class="pd-hero">
    <div class="pd-hero__bg" id="pd-hero-bg"></div>
    <div class="pd-hero__overlay"></div>
    <div class="pd-hero__content container">
      <a href="projects.html" class="pd-hero__back">&#8592; All Projects</a>
      <span class="pd-hero__cat" id="pd-hero-cat"></span>
      <h1 class="pd-hero__title" id="pd-hero-title"></h1>
      <p class="pd-hero__loc" id="pd-hero-loc"></p>
    </div>
  </section>

  <!-- Overview -->
  <section class="pd-overview">
    <div class="container">
      <div class="pd-overview__inner">
        <span class="pd-overview__label">Project Overview</span>
        <p class="pd-overview__text" id="pd-overview-text"></p>
      </div>
    </div>
  </section>

  <!-- Sections (injected) -->
  <div id="pd-sections"></div>

  <!-- Footer CTA -->
  <section class="pd-back-strip">
    <div class="container">
      <h2 class="fade-up">See more <em>work</em></h2>
      <p class="fade-up delay-1">Explore the full portfolio across architecture, interior design, and landscape.</p>
      <div class="pd-back-strip__actions fade-up delay-2">
        <a href="projects.html" class="btn btn--gold">All Projects</a>
        <a href="contact.html" class="btn btn--outline-light">Start a Project</a>
      </div>
    </div>
  </section>

  <script type="module">
    import { initHeader } from './js/components/header.js';
    import { initFooter } from './js/components/footer.js';
    import { init as initMain } from './js/main.js';

    initHeader();
    initFooter();

    const id = new URLSearchParams(location.search).get('id');
    if (!id) { location.href = 'projects.html'; }

    const res  = await fetch('_data/projects.json');
    const { projects } = await res.json();
    const p = projects.find(x => x.id === id);
    if (!p) { location.href = 'projects.html'; }

    // Page title
    document.title = `${p.title} — NILZ`;

    // Hero
    const heroImg = (p.slides && p.slides[0]) ? p.slides[0].image : p.image;
    document.getElementById('pd-hero-bg').style.backgroundImage = `url('${heroImg}')`;
    document.getElementById('pd-hero-cat').textContent  = p.category;
    document.getElementById('pd-hero-title').textContent = p.title;
    document.getElementById('pd-hero-loc').textContent  = p.location;

    // Overview
    document.getElementById('pd-overview-text').textContent = p.overview || p.description;

    // Sections — use explicit sections if present, otherwise one section per slide
    const sections = p.sections
      || (p.slides || []).map((s, i) => ({
           title: `View ${String(i + 1).padStart(2, '0')}`,
           description: '',
           renders: [s]
         }));

    document.getElementById('pd-sections').innerHTML = sections.map((sec, i) => {
      const count     = sec.renders.length;
      const gridMod   = `pd-renders--${Math.min(count, 3)}`;
      const altClass  = i % 2 === 1 ? 'pd-section--alt' : '';

      const rendersHTML = sec.renders.map(r => `
        <figure class="pd-render">
          <div class="pd-render__img" style="background-image:url('${r.image}')"></div>
          ${r.caption ? `<div class="pd-render__caption"><p>${r.caption}</p></div>` : ''}
        </figure>`).join('');

      return `
      <section class="pd-section ${altClass}">
        <div class="container">
          <div class="pd-section__header">
            <span class="pd-section__num">${String(i + 1).padStart(2, '0')}</span>
            <div>
              <h2 class="pd-section__title fade-up">${sec.title}</h2>
              ${sec.description ? `<p class="pd-section__desc fade-up delay-1">${sec.description}</p>` : ''}
            </div>
          </div>
          <div class="pd-renders ${gridMod} fade-up">${rendersHTML}</div>
        </div>
      </section>`;
    }).join('');

    initMain();
  </script>
</body>
</html>
